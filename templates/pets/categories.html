{% extends 'pets/browse_base.html' %}
{% load pet_filters %} 

{% block title %}Categories{% endblock %}

{% block browse_header %}
    <h1 class="display-4 vintage-heading mb-4"><span class="text-amber">★</span> Pet Categories <span class="text-amber">★</span></h1>
    
    <div class="dropdown mb-5 text-center">
        <button class="btn btn-outline-amber fw-bold rounded-pill px-5 py-2 dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Select a Category
        </button>
        <ul class="dropdown-menu shadow-sm border-0 mt-2" style="max-height: 300px; overflow-y: auto;">
            <li><a class="dropdown-item fw-bold text-muted" href="{% url 'pets:categories' %}">All Categories</a></li>
            <li><hr class="dropdown-divider"></li>
            {% for category in categories %}
                <li>
                    <a class="dropdown-item fw-bold" href="{% url 'pets:category_detail' category.slug %}">
                        {{ category.name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
