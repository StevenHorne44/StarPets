{% extends 'pets/base.html' %}

{% block title %}Upload a Pet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="mb-4 text-center">
            <h1 class="display-5 vintage-heading">Casting Call</h1>
            <p class="text-muted vintage-serif fs-5">Submit a new star to the StarPets registry.</p>
        </div>

        <div class="bg-white border rounded shadow-sm p-4 p-md-5 text-center">
            <form method="post" enctype="multipart/form-data" class="vintage-form">
                {% csrf_token %}
                
                {{ form.as_p }} 
                
                <hr class="my-4 border-light">
                
                <button type="submit" class="btn btn-amber btn-lg fw-bold px-5 shadow-sm w-100">
                    Submit Pet
                </button>
            </form>
        </div>
        
    </div>
</div>
{% endblock %}
