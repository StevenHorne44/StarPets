{% extends 'pets/base.html' %}

{% block title %}Select Pet to Delete{% endblock %}

{% block content %}
<h1>Select a Pet to Delete</h1>

<ul>
{% for pet in pets %}
  <li>
    <a href="{% url 'pets:delete_pet' pet.id %}">{{ pet.name }}</a>
  </li>
{% empty %}
  <li>You have no pets to delete</li>
{% endfor %}
</ul>
{% endblock %}
